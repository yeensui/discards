<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discards Wiki</title>
    <style>
        @import url('https://fonts.cdnfonts.com/css/tottenham');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* Applying the Spurs font */
            font-family: 'Tottenham', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #132257; /* Tottenham Navy Blue for contrast on pastels */
            text-align: center;
        }

        /* --- Smooth Pastel Gradient Animation --- */
        .gradient-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(-45deg, #a8e6cf, #dcedc1, #ffd3b6, #ffaaa5, #d291bc);
            background-size: 400% 400%;
            animation: gradientBG 18s ease-in-out infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- Text Pop-Up Animation --- */
        .content-container {
            animation: textPopUp 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(40px);
        }

        @keyframes textPopUp {
            0% {
                opacity: 0;
                transform: translateY(40px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- Spurs Typography Styling --- */
        h1 {
            font-size: 4.5rem;
            text-transform: uppercase; /* Spurs branding often uses All-Caps */
            letter-spacing: 2px;
            margin-bottom: 5px;
            font-weight: 900;
        }

        p {
            font-size: 1.6rem;
            font-weight: 400;
            opacity: 0.8;
            letter-spacing: 1px;
            margin-top: 0;
        }

    </style>
</head>
<body>

    <div class="gradient-background"></div>

    <div class="content-container">
        <h1>Welcome to discards wiki</h1>
        <p>All info about Discoys Discards here!</p>
    </div>

</body>
</html>
