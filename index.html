<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discards Wiki - Database</title>
    <style>
        /* --- Smooth Entry Fade --- */
        @keyframes fadeInPage {
            0% { opacity: 0; transform: translateY(20px); filter: blur(10px); }
            100% { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        @keyframes wavyGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(-45deg, #0b0e1e, #132257, #1a1d2e, #060914);
            background-size: 400% 400%;
            animation: fadeInPage 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards, wavyGradient 15s ease infinite;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .bg-logo {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 70vw; max-width: 600px;
            opacity: 0.07; filter: blur(15px);
            z-index: -1; pointer-events: none;
        }

        header { padding: 60px 20px 30px; text-align: center; z-index: 1; }
        h1 { font-size: 2.8rem; font-weight: 700; letter-spacing: -1.5px; margin: 0; }
        header p { color: rgba(255, 255, 255, 0.6); font-size: 1.1rem; margin-top: 10px; }

        .container {
            width: 100%;
            max-width: 850px;
            padding: 0 20px 100px;
            box-sizing: border-box;
            z-index: 1;
        }

        /* --- Glass Panel (Mobile Click Fix) --- */
        .glass-panel {
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(35px) saturate(150%);
            -webkit-backdrop-filter: blur(35px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            margin-bottom: 25px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        /* Desktop Hover works alongside Click */
        @media (min-width: 1024px) {
            .glass-panel:hover { background: rgba(255, 255, 255, 0.12); transform: translateY(-4px); }
        }

        .dropdown-header {
            padding: 24px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dropdown-header h2 { font-size: 1.3rem; margin: 0; font-weight: 600; }
        
        .chevron {
            width: 20px;
            height: 20px;
            transition: transform 0.4s ease;
            stroke: #fff;
        }

        .dropdown-content {
            max-height: 0;
            opacity: 0;
            padding: 0 30px;
            transition: all 0.4s ease-out;
            pointer-events: none;
        }

        /* This class is toggled by JS */
        .glass-panel.is-open .dropdown-content {
            max-height: 500px;
            opacity: 1;
            padding-bottom: 30px;
            pointer-events: auto;
        }

        .glass-panel.is-open .chevron { transform: rotate(180deg); }

        /* --- Buttons --- */
        .action-btn {
            display: block;
            width: 100%;
            padding: 22px;
            margin-top: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .action-btn:hover { background: rgba(255, 255, 255, 0.2); transform: scale(1.02); }

        .tier-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .upgrade-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <img src="https://upload.wikimedia.org/wikipedia/en/b/b4/Tottenham_Hotspur.svg" class="bg-logo">

    <header>
        <h1>Discards Wiki</h1>
        <p>Official Database</p>
    </header>

    <div class="container">
        
        <!-- Access Dropdown -->
        <div class="glass-panel" onclick="toggleDropdown(this)">
            <div class="dropdown-header">
                <h2>How to Access</h2>
                <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </div>
            <div class="dropdown-content">
                <p>1. Join the Spurs Discord.</p>
                <p>2. Open Activities tab.</p>
                <p>3. Launch Discoys Discards.</p>
            </div>
        </div>

        <!-- Upgrade Section -->
        <div class="glass-panel" style="padding: 24px 30px; cursor: default;">
            <h2 style="margin:0; font-size: 1.3rem;">Upgrade Tiers</h2>
            <div class="upgrade-grid">
                <div class="tier-item"><span style="color: #cd7f32;">5</span><br><small>BRONZE</small></div>
                <div class="tier-item"><span style="color: #d1d1d1;">8</span><br><small>SILVER</small></div>
                <div class="tier-item"><span style="color: #d4af37;">12</span><br><small>GOLD</small></div>
                <div class="tier-item"><span style="color: #5dade2;">15</span><br><small>DIAMOND</small></div>
            </div>
        </div>

        <!-- New Mechanics Page Button -->
        <a href="mechanics.html" class="action-btn">How do new Discards cards work? →</a>

    </div>

    <script>
        function toggleDropdown(el) {
            el.classList.toggle('is-open');
        }
    </script>
</body>
</html>
