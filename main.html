<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discards Wiki - Database</title>
    <style>
        /* --- Zoom-In Entry --- */
        @keyframes zoomInPage {
            0% { transform: scale(0.9); opacity: 0; filter: blur(20px); }
            100% { transform: scale(1); opacity: 1; filter: blur(0); }
        }

        body {
            margin: 0;
            min-height: 100vh;
            /* Liquid Gradient Background */
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
            animation: zoomInPage 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            color: #1d1d1f;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            padding: 60px 20px;
            text-align: center;
        }

        h1 { font-size: 2.5rem; font-weight: 700; letter-spacing: -1px; margin: 0; }
        header p { color: #6e6e73; font-size: 1.1rem; margin-top: 8px; }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 0 20px 100px;
            box-sizing: border-box;
        }

        /* --- Liquid Glass UI Element --- */
        .glass-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 28px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            margin-bottom: 25px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- Smooth Dropdown Menu --- */
        .dropdown-header {
            padding: 24px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .dropdown-header h2 { font-size: 1.3rem; margin: 0; font-weight: 600; }
        
        .chevron {
            width: 20px;
            height: 20px;
            transition: transform 0.4s ease;
        }

        .dropdown-content {
            max-height: 0;
            opacity: 0;
            padding: 0 30px;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

        /* Active Dropdown State */
        .glass-panel.active .dropdown-content {
            max-height: 400px;
            opacity: 1;
            padding-bottom: 30px;
            pointer-events: auto;
        }

        .glass-panel.active .chevron { transform: rotate(180deg); }

        /* --- Step Styling --- */
        .step {
            margin-bottom: 12px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            font-size: 1rem;
            display: flex;
            gap: 15px;
        }

        .discord-link { color: #0071e3; text-decoration: none; font-weight: 600; }

        /* --- Upgrade Grid --- */
        .upgrade-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .tier-item {
            background: rgba(255, 255, 255, 0.5);
            padding: 15px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .tier-val { font-size: 1.8rem; font-weight: 700; display: block; }
        .tier-name { font-size: 0.75rem; text-transform: uppercase; color: #86868b; font-weight: 600; }

        /* --- Floating Back Button --- */
        .back-btn {
            position: fixed;
            bottom: 30px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            color: #1d1d1f;
            font-weight: 600;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

<header>
    <h1>Discards Wiki</h1>
    <p>Database & Collection Guide</p>
</header>

<div class="container">
    
    <!-- Dropdown Section: Access -->
    <div class="glass-panel" id="accessDropdown">
        <div class="dropdown-header" onclick="toggleDropdown()">
            <h2>How to Access Discards</h2>
            <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </div>
        <div class="dropdown-content">
            <div class="step">
                <span style="color: #0071e3; font-weight: 700;">1</span>
                <span>Join the <a href="https://discord.gg/spurs" target="_blank" class="discord-link">Spurs Discord</a></span>
            </div>
            <div class="step">
                <span style="color: #0071e3; font-weight: 700;">2</span>
                <span>Open **Discord Activities**</span>
            </div>
            <div class="step">
                <span style="color: #0071e3; font-weight: 700;">3</span>
                <span>Launch **Discoys Discards**</span>
            </div>
        </div>
    </div>

    <!-- Upgrade Section -->
    <div class="glass-panel" style="padding: 24px 30px;">
        <h2 style="font-size: 1.3rem; margin: 0 0 20px 0;">Upgrade Requirements</h2>
        <div class="upgrade-grid">
            <div class="tier-item">
                <span class="tier-name">Bronze</span>
                <span class="tier-val" style="color: #cd7f32;">5</span>
            </div>
            <div class="tier-item">
                <span class="tier-name">Silver</span>
                <span class="tier-val" style="color: #a8a8a8;">8</span>
            </div>
            <div class="tier-item">
                <span class="tier-name">Gold</span>
                <span class="tier-val" style="color: #d4af37;">12</span>
            </div>
            <div class="tier-item">
                <span class="tier-name">Diamond</span>
                <span class="tier-val" style="color: #0071e3;">15</span>
            </div>
        </div>
    </div>

</div>

<a href="index.html" class="back-btn">← Home</a>

<script>
    function toggleDropdown() {
        const panel = document.getElementById('accessDropdown');
        panel.classList.toggle('active');
    }
</script>

</body>
</html>
